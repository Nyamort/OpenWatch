# Docker Compose — Production
# Usage: docker compose -f docker/production/docker-compose.yml up -d

services:
    app:
        image: ghcr.io/nyamort/openwatch:latest
        command: /usr/bin/supervisord -c /etc/supervisor/conf.d/supervisord.conf
        restart: unless-stopped
        ports:
            - '${APP_PORT:-80}:80'
        environment:
            APP_ENV: production
            APP_KEY: '${APP_KEY}'
            APP_URL: '${APP_URL}'
            DB_CONNECTION: mysql
            DB_HOST: mysql
            DB_PORT: 3306
            DB_DATABASE: '${DB_DATABASE:-openwatch}'
            DB_USERNAME: '${DB_USERNAME:-openwatch}'
            DB_PASSWORD: '${DB_PASSWORD}'
            REDIS_HOST: redis
            REDIS_PORT: 6379
            CLICKHOUSE_HOST: clickhouse
            CLICKHOUSE_HTTP_PORT: 8123
            CLICKHOUSE_DATABASE: '${CLICKHOUSE_DATABASE:-openwatch}'
            CLICKHOUSE_USERNAME: '${CLICKHOUSE_USERNAME:-default}'
            CLICKHOUSE_PASSWORD: '${CLICKHOUSE_PASSWORD:-}'
            QUEUE_CONNECTION: '${QUEUE_CONNECTION:-database}'
            CACHE_STORE: '${CACHE_STORE:-redis}'
            SESSION_DRIVER: '${SESSION_DRIVER:-redis}'
            MAIL_MAILER: '${MAIL_MAILER:-log}'
            MAIL_HOST: '${MAIL_HOST:-}'
            MAIL_PORT: '${MAIL_PORT:-587}'
            MAIL_USERNAME: '${MAIL_USERNAME:-}'
            MAIL_PASSWORD: '${MAIL_PASSWORD:-}'
            MAIL_FROM_ADDRESS: '${MAIL_FROM_ADDRESS:-hello@example.com}'
        volumes:
            - app-storage:/var/www/html/storage
        depends_on:
            mysql:
                condition: service_healthy
            redis:
                condition: service_healthy
            clickhouse:
                condition: service_healthy
        healthcheck:
            test: ['CMD', 'curl', '-f', 'http://localhost/up']
            interval: 10s
            timeout: 5s
            retries: 5
            start_period: 30s

    worker:
        image: ghcr.io/nyamort/openwatch:latest
        command: php artisan queue:work --sleep=3 --tries=3 --max-time=3600
        restart: unless-stopped
        environment: &app-env
            APP_ENV: production
            APP_KEY: '${APP_KEY}'
            APP_URL: '${APP_URL}'
            DB_CONNECTION: mysql
            DB_HOST: mysql
            DB_PORT: 3306
            DB_DATABASE: '${DB_DATABASE:-openwatch}'
            DB_USERNAME: '${DB_USERNAME:-openwatch}'
            DB_PASSWORD: '${DB_PASSWORD}'
            REDIS_HOST: redis
            REDIS_PORT: 6379
            CLICKHOUSE_HOST: clickhouse
            CLICKHOUSE_HTTP_PORT: 8123
            CLICKHOUSE_DATABASE: '${CLICKHOUSE_DATABASE:-openwatch}'
            CLICKHOUSE_USERNAME: '${CLICKHOUSE_USERNAME:-default}'
            CLICKHOUSE_PASSWORD: '${CLICKHOUSE_PASSWORD:-}'
            QUEUE_CONNECTION: '${QUEUE_CONNECTION:-database}'
            CACHE_STORE: '${CACHE_STORE:-redis}'
            SESSION_DRIVER: '${SESSION_DRIVER:-redis}'
        volumes:
            - app-storage:/var/www/html/storage
        depends_on:
            app:
                condition: service_healthy

    scheduler:
        image: ghcr.io/nyamort/openwatch:latest
        command: php artisan schedule:work
        restart: unless-stopped
        environment: *app-env
        volumes:
            - app-storage:/var/www/html/storage
        depends_on:
            app:
                condition: service_healthy

    mysql:
        image: mysql:8.4
        restart: unless-stopped
        environment:
            MYSQL_DATABASE: '${DB_DATABASE:-openwatch}'
            MYSQL_USER: '${DB_USERNAME:-openwatch}'
            MYSQL_PASSWORD: '${DB_PASSWORD}'
            MYSQL_ROOT_PASSWORD: '${DB_ROOT_PASSWORD:-root}'
        volumes:
            - mysql-data:/var/lib/mysql
        healthcheck:
            test: ['CMD', 'mysqladmin', 'ping', '-p${DB_PASSWORD}']
            interval: 5s
            timeout: 5s
            retries: 10

    redis:
        image: redis:7-alpine
        restart: unless-stopped
        volumes:
            - redis-data:/data
        healthcheck:
            test: ['CMD', 'redis-cli', 'ping']
            interval: 5s
            timeout: 5s
            retries: 5

    clickhouse:
        image: clickhouse/clickhouse-server:24
        restart: unless-stopped
        environment:
            CLICKHOUSE_DB: '${CLICKHOUSE_DATABASE:-openwatch}'
            CLICKHOUSE_USER: '${CLICKHOUSE_USERNAME:-default}'
            CLICKHOUSE_PASSWORD: '${CLICKHOUSE_PASSWORD:-}'
        volumes:
            - clickhouse-data:/var/lib/clickhouse
        healthcheck:
            test: ['CMD', 'clickhouse-client', '--query=SELECT 1']
            interval: 5s
            timeout: 5s
            retries: 10

volumes:
    app-storage:
    mysql-data:
    redis-data:
    clickhouse-data:
